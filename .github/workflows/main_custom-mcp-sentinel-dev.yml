name: Build and deploy Python project to Azure Function App - custom-mcp-sentinel-dev
on:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  PYTHON_VERSION: '3.13'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies for Azure Linux runtime
        run: |
          python -m pip install --upgrade pip
          mkdir -p .python_packages/lib/site-packages
          pip install \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.13 \
            --only-binary=:all: \
            --target=.python_packages/lib/site-packages \
            -r requirements.txt
      - name: Verify required files exist
        run: |
          test -f function_app.py
          test -f host.json
          test -f mcp_server.py
          test -f trinity_report.py
          test -f tool_tracer.py
          test -f requirements.txt
          test -f workspace_tables.json
      - name: Create deployment package
        run: |
          zip -r release.zip \
            function_app.py \
            host.json \
            mcp_server.py \
            trinity_report.py \
            tool_tracer.py \
            requirements.txt \
            workspace_tables.json \
            .python_packages
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp-package
          path: release.zip
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: functionapp-package
      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'custom-mcp-sentinel-dev'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B9552A6155CF425DB8E235ED23DC5D5A }}
          sku: 'flexconsumption'

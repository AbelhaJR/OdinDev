name: Build and deploy Python project to Azure Function App - custom-mcp-sentinel-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies for Azure Linux runtime
        run: |
          python -m pip install --upgrade pip
          mkdir -p .python_packages/lib/site-packages
          pip install \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.13 \
            --only-binary=:all: \
            --target=.python_packages/lib/site-packages \
            -r requirements.txt

      - name: Show repo contents
        run: |
          pwd
          ls -la

      - name: Verify required files exist
        run: |
          test -f function_app.py
          test -f host.json
          test -f mcp_server.py
          test -f requirements.txt
          test -f workspace_tables.json

      - name: Create deployment package
        run: |
          zip -r release.zip \
            function_app.py \
            host.json \
            mcp_server.py \
            requirements.txt \
            workspace_tables.json \
            .python_packages

      - name: Show zip contents
        run: |
          unzip -l release.zip | sed -n '1,200p'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp-package
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp-package
          path: .

      - name: Verify downloaded artifact
        run: |
          ls -la
          test -f release.zip
          unzip -l release.zip | sed -n '1,200p'

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'custom-mcp-sentinel'
          slot-name: 'Production'
          package: './release.zip'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6C5F6C4C695740F2A53CE32F205C04C1 }}
          sku: 'flexconsumption'
